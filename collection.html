<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>私人書架 — MANGA SELECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF8;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --accent: #E63946;
      --accent-light: rgba(230,57,70,0.08);
      --border: rgba(0,0,0,0.06);
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 16px;
      --font-sans: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-serif: "Noto Serif TC", serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* --- NAV --- */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,248,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--text);
    }
    .nav-logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #E63946, #D62839);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; color: #fff;
    }
    .nav-title {
      font-family: var(--font-serif);
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.04em;
    }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      font-size: 13px; color: var(--text-secondary);
      text-decoration: none; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }

    /* --- STATS DASHBOARD --- */
    .stats-section {
      max-width: 1200px; margin: 0 auto;
      padding: 32px 24px 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-family: var(--font-serif);
      font-size: 28px; font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-label {
      font-size: 12px; color: var(--text-muted);
      margin-top: 4px; font-weight: 500;
    }

    /* --- TABS --- */
    .tabs-section {
      max-width: 1200px; margin: 0 auto;
      padding: 24px 24px 0;
    }
    .tabs {
      display: flex; gap: 4px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }
    .tab {
      padding: 10px 18px;
      font-size: 13px; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 8px;
      margin-left: 4px;
    }

    /* --- COLLECTION CONTENT --- */
    .content-section {
      max-width: 1200px; margin: 0 auto;
      padding: 20px 24px 48px;
    }
    .filter-bar {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .search-input {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: var(--font-sans);
      background: var(--card);
      color: var(--text);
      outline: none;
      flex: 1; min-width: 200px;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .sort-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: var(--font-sans);
      background: var(--card);
      color: var(--text);
      outline: none; cursor: pointer;
    }

    /* --- TABLE --- */
    .collection-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }
    .collection-table thead th {
      font-size: 11px; font-weight: 600;
      color: var(--text-muted);
      text-align: left;
      padding: 8px 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .collection-table thead th:hover { color: var(--text-secondary); }
    .collection-table tbody tr {
      background: var(--card);
      transition: box-shadow 0.15s;
    }
    .collection-table tbody tr:hover {
      box-shadow: var(--shadow);
    }
    .collection-table td {
      padding: 12px;
      font-size: 14px;
      vertical-align: middle;
    }
    .collection-table td:first-child { border-radius: 10px 0 0 10px; }
    .collection-table td:last-child { border-radius: 0 10px 10px 0; }

    .row-cover {
      width: 44px; height: 62px;
      border-radius: 6px;
      overflow: hidden;
      background: #F1F5F9;
      flex-shrink: 0;
    }
    .row-cover img { width: 100%; height: 100%; object-fit: cover; }
    .row-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff;
      text-align: center; line-height: 1.1; padding: 2px;
    }
    .row-title-cell {
      display: flex; align-items: center; gap: 12px;
    }
    .row-title { font-weight: 600; }
    .row-original {
      font-size: 12px; color: var(--text-muted);
      margin-top: 1px;
    }
    .row-stars { color: #FBBF24; font-size: 13px; white-space: nowrap; }
    .row-status {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 6px;
      white-space: nowrap;
    }
    .row-status.reading { background: #DBEAFE; color: #1D4ED8; }
    .row-status.completed { background: #DCFCE7; color: #16A34A; }
    .row-status.want-to-read { background: #FEF3C7; color: #D97706; }
    .row-status.dropped { background: #FEE2E2; color: #DC2626; }
    .row-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .row-tag {
      font-size: 10px; padding: 1px 6px;
      border-radius: 3px; font-weight: 500;
    }
    .row-notes {
      font-size: 12px; color: var(--text-secondary);
      max-width: 200px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .row-date { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    .empty-state {
      text-align: center;
      padding: 48px; color: var(--text-muted);
    }

    /* --- EXPANDED ROW --- */
    .expanded-info {
      background: #F8FAFC;
      border-radius: 0 0 10px 10px;
    }
    .expanded-info td {
      padding: 16px 20px;
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.6;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .collection-table td, .collection-table th { padding: 8px 6px; font-size: 13px; }
      .row-cover { width: 36px; height: 50px; }
      .content-section { padding: 16px 12px 48px; }
      .stats-section, .tabs-section { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <div class="nav-logo">M</div>
        <span class="nav-title">漫坑選物</span>
      </a>
      <div class="nav-links">
        <a href="/">推薦頁</a>
        <a href="/collection.html" class="active">私人書架</a>
      </div>
    </div>
  </nav>

  <!-- STATS -->
  <div class="stats-section">
    <div class="stats-grid" id="stats-grid"></div>
  </div>

  <!-- TABS -->
  <div class="tabs-section">
    <div class="tabs" id="tabs"></div>
  </div>

  <!-- COLLECTION TABLE -->
  <div class="content-section">
    <div class="filter-bar">
      <input type="text" class="search-input" id="search" placeholder="搜尋漫畫名稱或作者...">
      <select class="sort-select" id="sort">
        <option value="rating">依評分</option>
        <option value="dateAdded">依新增日期</option>
        <option value="title">依名稱</option>
        <option value="status">依狀態</option>
      </select>
    </div>
    <table class="collection-table">
      <thead>
        <tr>
          <th>漫畫</th>
          <th>評分</th>
          <th class="hide-mobile">類型</th>
          <th>狀態</th>
          <th class="hide-mobile">進度</th>
          <th class="hide-mobile">備註</th>
          <th class="hide-mobile">新增日期</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty" style="display:none;">沒有找到符合條件的漫畫</div>
  </div>

  <script>
    let DATA = null;
    let activeTab = 'all';
    const GENRE_COLORS = {};
    const STATUS_MAP = {
      reading: '在讀',
      completed: '完讀',
      'want-to-read': '想讀',
      dropped: '棄坑',
    };
    const PLACEHOLDER_GRADIENTS = [
      'linear-gradient(135deg, #E63946, #F97316)',
      'linear-gradient(135deg, #3B82F6, #8B5CF6)',
      'linear-gradient(135deg, #10B981, #06B6D4)',
      'linear-gradient(135deg, #8B5CF6, #EC4899)',
    ];

    function getGradient(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
      return PLACEHOLDER_GRADIENTS[Math.abs(hash) % PLACEHOLDER_GRADIENTS.length];
    }

    function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

    function renderStats() {
      const all = DATA.manga;
      const completed = all.filter(m => m.readingStatus === 'completed').length;
      const reading = all.filter(m => m.readingStatus === 'reading').length;
      const wantToRead = all.filter(m => m.readingStatus === 'want-to-read').length;
      const avgRating = all.length ? (all.reduce((s, m) => s + m.rating, 0) / all.length).toFixed(1) : 0;

      // Most read genre
      const genreCount = {};
      all.forEach(m => m.genres.forEach(g => { genreCount[g] = (genreCount[g] || 0) + 1; }));
      const topGenre = Object.entries(genreCount).sort((a, b) => b[1] - a[1])[0];

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${all.length}</div><div class="stat-label">總收藏</div></div>
        <div class="stat-card"><div class="stat-value accent">${reading}</div><div class="stat-label">在讀</div></div>
        <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">完讀</div></div>
        <div class="stat-card"><div class="stat-value">${wantToRead}</div><div class="stat-label">想讀</div></div>
        <div class="stat-card"><div class="stat-value">${avgRating}</div><div class="stat-label">平均評分</div></div>
        <div class="stat-card"><div class="stat-value" style="font-size:18px">${topGenre ? topGenre[0] : '-'}</div><div class="stat-label">最愛類型</div></div>
      `;
    }

    function renderTabs() {
      const counts = { all: DATA.manga.length };
      DATA.manga.forEach(m => {
        counts[m.readingStatus] = (counts[m.readingStatus] || 0) + 1;
      });
      const tabDefs = [
        { id: 'all', label: '全部' },
        { id: 'reading', label: '在讀' },
        { id: 'completed', label: '完讀' },
        { id: 'want-to-read', label: '想讀' },
        { id: 'dropped', label: '棄坑' },
      ];
      document.getElementById('tabs').innerHTML = tabDefs.map(t =>
        `<div class="tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">
          ${t.label}<span class="badge">${counts[t.id] || 0}</span>
        </div>`
      ).join('');
    }

    function renderTable() {
      const search = document.getElementById('search').value.toLowerCase();
      const sort = document.getElementById('sort').value;

      let manga = [...DATA.manga];

      // Tab filter
      if (activeTab !== 'all') {
        manga = manga.filter(m => m.readingStatus === activeTab);
      }

      // Search filter
      if (search) {
        manga = manga.filter(m =>
          m.title.toLowerCase().includes(search) ||
          (m.titleOriginal && m.titleOriginal.toLowerCase().includes(search)) ||
          m.author.toLowerCase().includes(search)
        );
      }

      // Sort
      if (sort === 'rating') manga.sort((a, b) => b.rating - a.rating);
      else if (sort === 'dateAdded') manga.sort((a, b) => b.dateAdded.localeCompare(a.dateAdded));
      else if (sort === 'title') manga.sort((a, b) => a.title.localeCompare(b.title, 'zh-TW'));
      else if (sort === 'status') {
        const order = { reading: 0, 'want-to-read': 1, completed: 2, dropped: 3 };
        manga.sort((a, b) => (order[a.readingStatus] ?? 9) - (order[b.readingStatus] ?? 9));
      }

      const tbody = document.getElementById('table-body');
      const empty = document.getElementById('empty');

      if (!manga.length) {
        tbody.innerHTML = '';
        empty.style.display = '';
        return;
      }
      empty.style.display = 'none';

      tbody.innerHTML = manga.map(m => {
        const coverHTML = m.coverUrl
          ? `<img src="${m.coverUrl}" alt="${m.title}" loading="lazy">`
          : `<div class="row-cover-placeholder" style="background:${getGradient(m.id)}">${m.title.slice(0, 2)}</div>`;

        const tagsHTML = m.genres.map(g => {
          const color = GENRE_COLORS[g] || '#94A3B8';
          return `<span class="row-tag" style="background:${color}15;color:${color}">${g}</span>`;
        }).join('');

        return `
          <tr>
            <td>
              <div class="row-title-cell">
                <div class="row-cover">${coverHTML}</div>
                <div>
                  <div class="row-title">${m.title}</div>
                  <div class="row-original">${m.author}</div>
                </div>
              </div>
            </td>
            <td><span class="row-stars">${stars(m.rating)}</span></td>
            <td class="hide-mobile"><div class="row-tags">${tagsHTML}</div></td>
            <td><span class="row-status ${m.readingStatus}">${STATUS_MAP[m.readingStatus] || m.readingStatus}</span></td>
            <td class="hide-mobile">${m.currentProgress || '-'}</td>
            <td class="hide-mobile"><div class="row-notes">${m.notes || '-'}</div></td>
            <td class="hide-mobile"><span class="row-date">${m.dateAdded}</span></td>
          </tr>`;
      }).join('');
    }

    function renderAll() {
      DATA.genres.forEach(g => { GENRE_COLORS[g.label] = g.color; });
      renderStats();
      renderTabs();
      renderTable();
    }

    // Event listeners
    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderTable();
    });

    document.getElementById('search').addEventListener('input', renderTable);
    document.getElementById('sort').addEventListener('change', renderTable);

    // Load data
    fetch('./data.json')
      .then(r => r.json())
      .then(data => { DATA = data; renderAll(); })
      .catch(err => {
        console.error('Failed to load data:', err);
        document.getElementById('empty').textContent = '資料載入失敗';
        document.getElementById('empty').style.display = '';
      });
  </script>
</body>
</html>
