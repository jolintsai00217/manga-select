<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Private Collection — MANGA SELECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500;600;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFBEB;
      --bg-warm: #FCF6F0;
      --card: #FFFFFF;
      --text: #1E293B;
      --text-secondary: #64748B;
      --text-muted: #94A3B8;
      --accent: #C23B22;
      --accent-light: rgba(194,59,34,0.06);
      --amber: #D97706;
      --border: #FAEEE1;
      --border-strong: #E8D5C4;
      --shadow: 0 2px 12px rgba(120,80,40,0.06);
      --radius: 4px;
      --font-sans: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-serif: "Shippori Mincho", "Noto Serif JP", serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.7;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
    }

    /* --- NAV --- */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,251,235,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1120px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 52px; padding: 0 32px;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none; color: var(--text);
    }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 20px; font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em; line-height: 1;
    }
    .nav-divider { width: 1px; height: 16px; background: var(--border-strong); }
    .nav-sub {
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      font-size: 12px; color: var(--text-secondary);
      text-decoration: none; font-weight: 500;
      letter-spacing: 0.06em; transition: color 0.2s;
      cursor: pointer;
    }
    .nav-links a:hover { color: var(--accent); }
    .nav-links a.active { color: var(--accent); }

    /* --- STATS --- */
    .stats-section {
      max-width: 1120px; margin: 0 auto;
      padding: 32px 32px 0;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .stat-card {
      background: var(--card);
      padding: 20px 16px;
      text-align: center;
    }
    .stat-value {
      font-family: var(--font-serif);
      font-size: 32px; font-weight: 700;
      color: var(--text); line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }
    .stat-label {
      font-size: 10px; color: var(--text-muted);
      margin-top: 6px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* --- TABS --- */
    .tabs-section {
      max-width: 1120px; margin: 0 auto;
      padding: 28px 32px 0;
    }
    .tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--text);
      overflow-x: auto;
    }
    .tab {
      padding: 10px 20px;
      font-size: 12px; font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      white-space: nowrap;
      user-select: none;
      letter-spacing: 0.04em;
    }
    .tab:hover { color: var(--text-secondary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab .badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 2px;
      margin-left: 6px;
    }

    /* --- CONTENT --- */
    .content-section {
      max-width: 1120px; margin: 0 auto;
      padding: 24px 32px 64px;
    }
    .filter-bar {
      display: flex; gap: 12px; align-items: center;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .search-input {
      padding: 9px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      font-size: 13px;
      font-family: var(--font-sans);
      background: var(--card);
      color: var(--text);
      outline: none;
      flex: 1; min-width: 200px;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { border-color: var(--accent); }
    .sort-select {
      padding: 9px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      font-size: 12px;
      font-family: var(--font-sans);
      background: var(--card);
      color: var(--text);
      outline: none; cursor: pointer;
    }

    /* --- TABLE --- */
    .collection-table {
      width: 100%;
      border-collapse: collapse;
    }
    .collection-table thead th {
      font-size: 10px; font-weight: 700;
      color: var(--text-muted);
      text-align: left;
      padding: 10px 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      border-bottom: 1px solid var(--border-strong);
    }
    .collection-table thead th:hover { color: var(--text-secondary); }
    .collection-table tbody tr {
      background: var(--card);
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }
    .collection-table tbody tr:hover { background: var(--bg-warm); }
    .collection-table td {
      padding: 14px;
      font-size: 13px;
      vertical-align: middle;
    }

    .row-cover {
      width: 40px; height: 56px;
      border-radius: 2px;
      overflow: hidden;
      background: var(--bg-warm);
      flex-shrink: 0;
      box-shadow: 2px 2px 0 rgba(120,80,40,0.06);
    }
    .row-cover img { width: 100%; height: 100%; object-fit: cover; }
    .row-cover-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      text-align: center; line-height: 1.1; padding: 2px;
    }
    .row-title-cell { display: flex; align-items: center; gap: 12px; }
    .row-title {
      font-family: var(--font-serif);
      font-weight: 600; font-size: 14px;
    }
    .row-original { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .row-stars { color: var(--amber); font-size: 12px; white-space: nowrap; letter-spacing: 1px; }
    .row-status {
      display: inline-block;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px; border-radius: 2px;
      white-space: nowrap; letter-spacing: 0.04em;
    }
    .row-status.reading { background: rgba(37,99,235,0.08); color: #2563EB; }
    .row-status.completed { background: rgba(22,163,106,0.08); color: #16A36A; }
    .row-status.want-to-read { background: rgba(217,119,6,0.08); color: #D97706; }
    .row-status.dropped { background: rgba(220,38,38,0.08); color: #DC2626; }
    .row-tags { display: flex; flex-wrap: wrap; gap: 3px; }
    .row-tag {
      font-size: 10px; padding: 1px 6px;
      border-radius: 2px; font-weight: 500;
    }
    .row-notes {
      font-family: var(--font-serif);
      font-size: 12px; color: var(--text-secondary);
      max-width: 200px; font-style: italic;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .row-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    .empty-state {
      text-align: center; padding: 48px;
      color: var(--text-muted);
      font-family: var(--font-serif); font-style: italic;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .collection-table td, .collection-table th { padding: 10px 8px; font-size: 12px; }
      .row-cover { width: 36px; height: 50px; }
      .content-section { padding: 16px 12px 48px; }
      .stats-section, .tabs-section { padding-left: 12px; padding-right: 12px; }
      .nav-inner { padding: 0 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-logo">漫坑選物</span>
        <span class="nav-divider"></span>
        <span class="nav-sub">Manga Select</span>
      </a>
      <div class="nav-links">
        <a href="/">Public</a>
        <a href="/collection.html" class="active">Private</a>
      </div>
    </div>
  </nav>

  <div class="stats-section">
    <div class="stats-grid" id="stats-grid"></div>
  </div>

  <div class="tabs-section">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="content-section">
    <div class="filter-bar">
      <input type="text" class="search-input" id="search" placeholder="Search title or author...">
      <select class="sort-select" id="sort">
        <option value="rating">By Rating</option>
        <option value="dateAdded">By Date</option>
        <option value="title">By Title</option>
        <option value="status">By Status</option>
      </select>
    </div>
    <table class="collection-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Rating</th>
          <th class="hide-mobile">Genre</th>
          <th>Status</th>
          <th class="hide-mobile">Progress</th>
          <th class="hide-mobile">Notes</th>
          <th class="hide-mobile">Added</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty-state" id="empty" style="display:none;">No manga found.</div>
  </div>

  <script>
    let DATA = null;
    let activeTab = 'all';
    const GENRE_COLORS = {};
    const STATUS_MAP = { reading: '在讀', completed: '完讀', 'want-to-read': '想讀', dropped: '棄坑' };
    const PLACEHOLDER_GRADIENTS = [
      'linear-gradient(145deg, #C23B22, #D97706)',
      'linear-gradient(145deg, #1E293B, #475569)',
      'linear-gradient(145deg, #6366F1, #8B5CF6)',
      'linear-gradient(145deg, #059669, #0D9488)',
    ];

    function getGradient(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
      return PLACEHOLDER_GRADIENTS[Math.abs(hash) % PLACEHOLDER_GRADIENTS.length];
    }

    function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }

    function renderStats() {
      const all = DATA.manga;
      const completed = all.filter(m => m.readingStatus === 'completed').length;
      const reading = all.filter(m => m.readingStatus === 'reading').length;
      const wantToRead = all.filter(m => m.readingStatus === 'want-to-read').length;
      const avgRating = all.length ? (all.reduce((s, m) => s + m.rating, 0) / all.length).toFixed(1) : 0;
      const genreCount = {};
      all.forEach(m => m.genres.forEach(g => { genreCount[g] = (genreCount[g] || 0) + 1; }));
      const topGenre = Object.entries(genreCount).sort((a, b) => b[1] - a[1])[0];

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-value">${all.length}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value accent">${reading}</div><div class="stat-label">Reading</div></div>
        <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Done</div></div>
        <div class="stat-card"><div class="stat-value">${wantToRead}</div><div class="stat-label">Wishlist</div></div>
        <div class="stat-card"><div class="stat-value">${avgRating}</div><div class="stat-label">Avg Rating</div></div>
        <div class="stat-card"><div class="stat-value" style="font-size:16px">${topGenre ? topGenre[0] : '-'}</div><div class="stat-label">Top Genre</div></div>
      `;
    }

    function renderTabs() {
      const counts = { all: DATA.manga.length };
      DATA.manga.forEach(m => { counts[m.readingStatus] = (counts[m.readingStatus] || 0) + 1; });
      const tabDefs = [
        { id: 'all', label: '全部' }, { id: 'reading', label: '在讀' },
        { id: 'completed', label: '完讀' }, { id: 'want-to-read', label: '想讀' },
        { id: 'dropped', label: '棄坑' },
      ];
      document.getElementById('tabs').innerHTML = tabDefs.map(t =>
        `<div class="tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">
          ${t.label}<span class="badge">${counts[t.id] || 0}</span>
        </div>`
      ).join('');
    }

    function renderTable() {
      const search = document.getElementById('search').value.toLowerCase();
      const sort = document.getElementById('sort').value;
      let manga = [...DATA.manga];

      if (activeTab !== 'all') manga = manga.filter(m => m.readingStatus === activeTab);
      if (search) manga = manga.filter(m =>
        m.title.toLowerCase().includes(search) ||
        (m.titleOriginal && m.titleOriginal.toLowerCase().includes(search)) ||
        m.author.toLowerCase().includes(search));

      if (sort === 'rating') manga.sort((a, b) => b.rating - a.rating);
      else if (sort === 'dateAdded') manga.sort((a, b) => b.dateAdded.localeCompare(a.dateAdded));
      else if (sort === 'title') manga.sort((a, b) => a.title.localeCompare(b.title, 'zh-TW'));
      else if (sort === 'status') {
        const order = { reading: 0, 'want-to-read': 1, completed: 2, dropped: 3 };
        manga.sort((a, b) => (order[a.readingStatus] ?? 9) - (order[b.readingStatus] ?? 9));
      }

      const tbody = document.getElementById('table-body');
      const empty = document.getElementById('empty');

      if (!manga.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
      empty.style.display = 'none';

      tbody.innerHTML = manga.map(m => {
        const coverHTML = m.coverUrl
          ? `<img src="${m.coverUrl}" alt="${m.title}" loading="lazy">`
          : `<div class="row-cover-placeholder" style="background:${getGradient(m.id)}">${m.title.slice(0, 2)}</div>`;
        const tagsHTML = m.genres.map(g => {
          const color = GENRE_COLORS[g] || '#94A3B8';
          return `<span class="row-tag" style="background:${color}10;color:${color}">${g}</span>`;
        }).join('');

        return `
          <tr>
            <td><div class="row-title-cell"><div class="row-cover">${coverHTML}</div><div><div class="row-title">${m.title}</div><div class="row-original">${m.author}</div></div></div></td>
            <td><span class="row-stars">${stars(m.rating)}</span></td>
            <td class="hide-mobile"><div class="row-tags">${tagsHTML}</div></td>
            <td><span class="row-status ${m.readingStatus}">${STATUS_MAP[m.readingStatus] || m.readingStatus}</span></td>
            <td class="hide-mobile">${m.currentProgress || '-'}</td>
            <td class="hide-mobile"><div class="row-notes">${m.notes || '-'}</div></td>
            <td class="hide-mobile"><span class="row-date">${m.dateAdded}</span></td>
          </tr>`;
      }).join('');
    }

    function renderAll() {
      DATA.genres.forEach(g => { GENRE_COLORS[g.label] = g.color; });
      renderStats(); renderTabs(); renderTable();
    }

    document.getElementById('tabs').addEventListener('click', e => {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderTable();
    });

    document.getElementById('search').addEventListener('input', renderTable);
    document.getElementById('sort').addEventListener('change', renderTable);

    fetch('./data.json')
      .then(r => r.json())
      .then(data => { DATA = data; renderAll(); })
      .catch(err => { console.error(err); document.getElementById('empty').style.display = ''; });
  </script>
</body>
</html>
