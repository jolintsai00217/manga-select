<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>MANGA SELECT 漫坑選物</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #FAFAF8;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 30%, rgba(230,57,70,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 50% 60% at 80% 70%, rgba(59,130,246,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative; z-index: 1;
      background: #FFFFFF;
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: 20px;
      padding: 44px 40px;
      width: 100%; max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    }

    .brand-mark {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #E63946, #D62839);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff;
    }
    .brand-name {
      font-family: "Noto Serif TC", serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.08em;
      color: #1A1A2E;
    }
    .brand-sub {
      font-size: 11px; color: #94A3B8;
      letter-spacing: 0.15em; text-transform: uppercase;
      font-weight: 500;
    }

    h1 {
      font-family: "Noto Serif TC", serif;
      font-size: 22px; font-weight: 700;
      color: #1A1A2E;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px; color: #94A3B8;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .input-wrap { position: relative; margin-bottom: 12px; }
    input {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 10px;
      font-size: 15px;
      font-family: "Noto Sans TC", sans-serif;
      background: #FAFAF8;
      color: #1A1A2E;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #CBD5E1; }
    input:focus {
      border-color: #E63946;
      box-shadow: 0 0 0 3px rgba(230,57,70,0.08);
    }

    button {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #E63946, #D62839);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: "Noto Sans TC", sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(230,57,70,0.25);
      margin-top: 4px;
    }
    button:hover { opacity: 0.92; }
    button:active { opacity: 0.85; transform: scale(0.99); }

    .error {
      font-size: 12px; color: #EF4444;
      margin-top: 12px; min-height: 16px;
      text-align: center;
    }

    .footer-note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.05);
      text-align: center;
      font-size: 11px; color: #CBD5E1;
      letter-spacing: 0.04em;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: #94A3B8;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #E63946; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">
      <div class="brand-icon">M</div>
      <div>
        <div class="brand-name">漫坑選物</div>
        <div class="brand-sub">MANGA SELECT</div>
      </div>
    </div>
    <h1>私人書架</h1>
    <p class="subtitle">登入以查看完整閱讀記錄</p>
    <div class="input-wrap">
      <input id="pw" type="password" placeholder="輸入密碼" autocomplete="current-password" autofocus>
    </div>
    <button onclick="login()">進入書架</button>
    <div class="error" id="err"></div>
    <a href="/" class="back-link">← 返回推薦頁</a>
    <div class="footer-note">PRIVATE COLLECTION</div>
  </div>
  <script>
    async function login() {
      const password = document.getElementById('pw').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/collection.html';
      } else {
        const err = document.getElementById('err');
        err.textContent = '密碼錯誤';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        setTimeout(() => { err.textContent = ''; }, 2000);
      }
    }
    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
