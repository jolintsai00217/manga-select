<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>MANGA SELECT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans JP", -apple-system, sans-serif;
      background: #FFFBEB;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 256px 256px;
    }

    .card {
      position: relative; z-index: 1;
      background: #FFFFFF;
      border: 1px solid #FAEEE1;
      border-radius: 4px;
      padding: 48px 40px;
      width: 100%; max-width: 360px;
    }

    .brand-mark { margin-bottom: 40px; text-align: center; }
    .brand-title {
      font-family: "Shippori Mincho", serif;
      font-size: 24px; font-weight: 800;
      color: #C23B22;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: #94A3B8;
    }
    .brand-rule {
      width: 32px; height: 2px;
      background: #C23B22;
      margin: 16px auto 0;
    }

    h1 {
      font-family: "Shippori Mincho", serif;
      font-size: 18px; font-weight: 600;
      color: #1E293B;
      margin-bottom: 6px;
      text-align: center;
    }
    .subtitle {
      font-size: 12px; color: #94A3B8;
      margin-bottom: 28px;
      text-align: center;
    }

    .input-wrap { position: relative; margin-bottom: 14px; }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #E8D5C4;
      border-radius: 2px;
      font-size: 14px;
      font-family: "Noto Sans JP", sans-serif;
      background: #FFFBEB;
      color: #1E293B;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #CBD5E1; }
    input:focus { border-color: #C23B22; }

    button {
      width: 100%;
      padding: 12px;
      background: #1E293B;
      color: #FFFBEB;
      border: none;
      border-radius: 2px;
      font-size: 12px; font-weight: 700;
      font-family: "Noto Sans JP", sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 2px;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.99); }

    .error {
      font-size: 12px; color: #DC2626;
      margin-top: 12px; min-height: 16px;
      text-align: center;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #94A3B8;
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.04em;
    }
    .back-link:hover { color: #C23B22; }

    .footer-note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #FAEEE1;
      text-align: center;
      font-size: 10px; color: #CBD5E1;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand-mark">
      <div class="brand-title">漫坑選物</div>
      <div class="brand-sub">Manga Select</div>
      <div class="brand-rule"></div>
    </div>
    <h1>私人書架</h1>
    <p class="subtitle">Enter password to view private collection</p>
    <div class="input-wrap">
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
    </div>
    <button onclick="login()">Enter</button>
    <div class="error" id="err"></div>
    <a href="/" class="back-link">&larr; Back to public page</a>
    <div class="footer-note">Private Collection</div>
  </div>
  <script>
    async function login() {
      const password = document.getElementById('pw').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = '/collection.html';
      } else {
        const err = document.getElementById('err');
        err.textContent = 'Wrong password';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
        setTimeout(() => { err.textContent = ''; }, 2000);
      }
    }
    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
